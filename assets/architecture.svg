<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="520" viewBox="0 0 1400 520">
<style>
  .box{fill:#fff;stroke:#1f2937;stroke-width:2;rx:18}
  .title{font:700 24px system-ui,sans-serif;fill:#111827}
  .txt{font:18px system-ui,sans-serif;fill:#374151}
  .small{font:15px system-ui,sans-serif;fill:#4b5563}
  .arrow{stroke:#2563eb;stroke-width:4;fill:none;marker-end:url(#a)}
  .power{stroke:#dc2626;stroke-width:4;fill:none;marker-end:url(#r)}
  .rs{stroke:#7c3aed;stroke-width:4;fill:none;marker-end:url(#p)}
</style>
<defs>
 <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/></marker>
 <marker id="r" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#dc2626"/></marker>
 <marker id="p" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#7c3aed"/></marker>
</defs>
<rect width="1400" height="520" fill="#f8fafc"/>
<rect class="box" x="40" y="160" width="250" height="160"/>
<text class="title" x="165" y="205" text-anchor="middle">Syclope</text>
<text class="txt" x="165" y="240" text-anchor="middle">HydroTouch CHY0444</text>
<text class="small" x="165" y="275" text-anchor="middle">RS485 • 19200 • 8N1 • ID 1</text>

<rect class="box" x="415" y="120" width="290" height="240"/>
<text class="title" x="560" y="170" text-anchor="middle">Waveshare</text>
<text class="txt" x="560" y="205" text-anchor="middle">RS232/485/422 → Ethernet</text>
<text class="small" x="560" y="245" text-anchor="middle">TCP Server • port données 4196</text>
<text class="small" x="560" y="278" text-anchor="middle">RTU encapsulé sur TCP</text>
<text class="small" x="560" y="311" text-anchor="middle">IP d’exemple 192.168.1.200</text>

<rect class="box" x="830" y="80" width="250" height="150"/>
<text class="title" x="955" y="125" text-anchor="middle">Réseau local</text>
<text class="txt" x="955" y="162" text-anchor="middle">Ethernet / CPL</text>
<text class="small" x="955" y="195" text-anchor="middle">Routeur d’exemple 192.168.1.1</text>

<rect class="box" x="1130" y="40" width="230" height="160"/>
<text class="title" x="1245" y="90" text-anchor="middle">Home Assistant</text>
<text class="txt" x="1245" y="128" text-anchor="middle">Modbus rtuovertcp</text>
<text class="small" x="1245" y="163" text-anchor="middle">pH + Redox + dashboard</text>

<rect class="box" x="830" y="305" width="250" height="140"/>
<text class="title" x="955" y="350" text-anchor="middle">Alimentation</text>
<text class="txt" x="955" y="387" text-anchor="middle">Mean Well 12 V / 1,25 A</text>
<text class="small" x="955" y="418" text-anchor="middle">Sortie +V / −V vers VCC / GND</text>

<path class="rs" d="M290 240 H415"/>
<text class="small" x="352" y="222" text-anchor="middle">A/B (et C optionnel)</text>
<path class="arrow" d="M705 210 H830"/>
<text class="small" x="767" y="192" text-anchor="middle">Ethernet</text>
<path class="arrow" d="M1080 145 H1130"/>
<path class="power" d="M900 305 V250 H705"/>
<text class="small" x="790" y="287" text-anchor="middle">12 V DC</text>
</svg>